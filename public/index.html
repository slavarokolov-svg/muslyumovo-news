<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Муслюмово — актуальные новости</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease;
        }

        :root {
            --bg-primary: #f9fafb;
            --bg-secondary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #c2410c;
            --border-light: #e5e7eb;
            --footer-bg: #1f2937;
        }

        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
            --footer-bg: #020617;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c2410c, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .theme-toggle {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
        }

        .hero {
            margin: 2rem 0;
            border-radius: 2rem;
            background: linear-gradient(120deg, var(--bg-secondary), var(--bg-primary));
            border: 1px solid var(--border-light);
            padding: 2rem;
            text-align: center;
        }

        .hero h2 {
            font-size: 2rem;
            background: linear-gradient(to right, #f97316, #dc2626);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .update-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            border-left: 6px solid var(--accent);
            padding-left: 18px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .news-card {
            background: var(--bg-secondary);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-light);
            transition: transform 0.3s;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 1.4rem;
        }

        .date {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .fresh-badge {
            background: #22c55e;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .desc {
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .footer {
            background: var(--footer-bg);
            color: #94a3b8;
            padding: 2rem 0;
            margin-top: 3rem;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--accent);
            grid-column: 1/-1;
        }

        @media (max-width: 700px) {
            .hero h2 { font-size: 1.4rem; }
            .news-grid { gap: 1rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="nav">
            <div class="logo">
                <h1>Муслюмово LIFE</h1>
                <p>Новости обновляются каждые 24 часа</p>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i> Тема
            </div>
        </div>
    </div>
</header>

<main class="container">
    <div class="hero">
        <h2>Актуальные новости Муслюмово</h2>
        <p style="margin-top: 12px;">Новости хранятся 7 дней, затем автоматически удаляются</p>
        <div class="update-badge">
            <i class="fas fa-sync-alt"></i> Обновление: каждые 24 часа
        </div>
    </div>

    <div class="section-title">
        <i class="fas fa-clock"></i> Свежие новости (последние 7 дней)
    </div>

    <div class="news-grid" id="newsGrid">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Новости Муслюмово | Новости автоматически удаляются через 7 дней</p>
    </div>
</footer>

<script>
    // Тёмная тема
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });

    // Функция определения "свежести" новости (в днях)
    function getFreshness(createdAt) {
        const created = new Date(createdAt);
        const now = new Date();
        const diffHours = Math.floor((now - created) / (1000 * 60 * 60));
        if (diffHours < 24) return { text: "Только что", class: "fresh-badge" };
        if (diffHours < 48) return { text: "Вчера", class: "" };
        const days = Math.floor(diffHours / 24);
        return { text: `${days} дня(ей) назад`, class: "" };
    }

    async function loadNews() {
        const grid = document.getElementById('newsGrid');
        try {
            const response = await fetch('/api/news');
            const news = await response.json();
            
            if (news.length === 0) {
                grid.innerHTML = '<div class="loading">Новости загружаются. Подождите, идёт парсинг...</div>';
                return;
            }

            grid.innerHTML = news.map(item => {
                const freshness = getFreshness(item.created_at);
                return `
                    <div class="news-card">
                        <img class="card-img" src="${item.image_url || 'https://images.unsplash.com/photo-1563897539633-3f6af64f0dc2?w=600'}" loading="lazy">
                        <div class="card-content">
                            <div class="date">
                                <i class="far fa-calendar-alt"></i> ${item.date}
                                ${freshness.text !== "Только что" ? '' : `<span class="${freshness.class}"><i class="fas fa-fire"></i> ${freshness.text}</span>`}
                            </div>
                            <div class="card-title">${escapeHtml(item.title)}</div>
                            <div class="desc">${escapeHtml(item.description)}</div>
                            <div style="margin-top: 12px; font-size: 0.7rem; color: var(--accent);">
                                <i class="fas fa-database"></i> ${escapeHtml(item.source || 'Муслюмово LIFE')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (error) {
            grid.innerHTML = '<div class="loading">Ошибка загрузки. Перезагрузите страницу.</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadNews();
    // Автообновление каждые 5 минут
    setInterval(loadNews, 300000);
</script>
</body>
</html>
